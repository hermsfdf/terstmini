<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItsMarket_bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Стили прямо здесь для удобства, либо вынеси в style.css */
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #999999);
            --btn: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: column;
            padding-top: 10;
            height: 100vh;
            gap: 20px;
        }

        .card {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--card);
            font-size: 0.8em
        }

        .page {
            pisition: fixed
            background: rgba(5,2,1,5.05);
            padding: 5px;
            border-radius: 10px;
            width: 50%;
            text-aling: center;
        }

        button {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background-color: var(--btn);
            color: var(--btn-text);
            font-weight: bold;
            cursor: pointer;
        }

        .hint {
            positio: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--hint);
            font-size: 0.8em
        }

            
            
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>ЭТО Маркет!</h1>
        <p class="hint">
            <span id="greeting"></span>, <span id="username">Гость</span>!
        </p>
    </div>

    <div id="page1" class="page">
        <h2>Главное меню</h2>
        <button class="menu-btn" onclick="goToPage('page2')">Открыть настройки</button>
        <button class="menu-btn" id="closeBtn">Закрыть приложение</button>
    </div>

    <div id="page2" class="page" style="display: none;">
        <h2>Настройки</h2>
        <button class="menu-btn" onclick="goToPage('page1')">Назад в меню</button>
        <button class="menu-btn" id="vibeBtn">Вибрация</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
