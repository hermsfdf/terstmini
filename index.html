<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Общие стили */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Черный фон */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Заголовок главного меню */
        header {
            text-align: center;
            padding: 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }

        h1 { margin: 0; font-size: 1.5rem; color: #00d2ff; }
        p { margin: 5px 0 0; color: #aaa; }

        /* Контент страниц */
        .page {
            display: none; /* Скрыты по умолчанию */
            height: calc(100vh - 140px);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            font-weight: bold;
        }

        .page.active {
            display: flex;
        }

        /* Нижнее меню (Вкладки) */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1rem;
            cursor: pointer;
            padding: 10px;
            transition: 0.3s;
        }

        .nav-btn.active {
            color: #00d2ff;
            transform: scale(1.2);
        }

        .content-container {
            padding: 10px;
            width: 90%;
            max-width 400px;
        }

        .card {
            background: #1c1c1e;
            border-radius: 15px;
            overflow: hidden;
            margin_bottom: 20px;
            border: 1px solid #333;
            text-align: left;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card-title {
            font-size: 1.4rem;
            margin: 0 0 5px 0;
            color: #00d2ff;
        }
        .card-info {
            padding: 15px;
        }
        .card-description {
            font-size: 0.9rem;
            color: #aaa;
            margin: 0 0 15px 0;
            line-height: 1.4;
        }

        .card-price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }

        .buy-btn {
            width: 100%;
            background: #00d2ff;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
        
    </style>
</head>
<body>

    <header id="main-header">
        <h1>ЭТО Маркет!</h1>
        <span id="greeting"></span>, <span id="username">Гость</span>!
    </header>

    <div id="page1" class="page active">
        <div class="content-container">
            
            <div class="card">
                <img src="https://assets.lis-skins.com/market_images/11591_b.png" alt="Товар">
                
                <div class="card-info">
                    <h3 class="card-title">Souvenir AWP | Dragon Lore</h3>
                    <p class="card-description">
                        Float: 0.288684, Тип: Снайперская винтовка.
                    </p>
                    <div class="card-price">1 500 ₽</div>
                    <button class="buy-btn" onclick="alert('Товар добавлен в корзину!')">Купить</button>
                </div>
            </div>
    
        </div>
    </div>
            </div>      
        </div>
    </div>
    
    <div id="page2" class="page">
        <div style="text-align: center;">
            <h2 style="font-size: 2rem;">Мои заказы</h2>
            <p style="font-size: 1rem; color: #aaa;">У вас пока нет активных заказов</p>
        </div>
    </div>
    
    <div id="page3" class="page">
        <div style="text-align: center;">
            <h2 style="font-size: 2rem;">Кошелек</h2>
            <p style="font-size: 3rem;">0.00 ₽</p>
            <button style="border: 1px solid #fff; background: none; color: white; padding: 10px;">Пополнить</button>
        </div>
    </div>
    
    <div id="page4" class="page">
        <div style="text-align: center;">
            <h2 style="font-size: 2rem;">Статистика</h2>
            <p style="font-size: 1rem;">Тут будут графики ваших покупок</p>
        </div>
    </div>
    
    <div id="page5" class="page">
        <div style="text-align: center;">
            <h2 style="font-size: 2rem;">Настройки</h2>
            <p style="font-size: 1rem;">Уведомления: ВКЛ</p>
            <p style="font-size: 1rem;">Язык: Русский</p>
        </div>
    </div>

    <nav>
        <button class="nav-btn" onclick="goToPage('page1')">🛒</button>
        <button class="nav-btn" onclick="goToPage('page2')">📦</button>
        <button class="nav-btn" onclick="goToPage('page3')">💳</button>
        <button class="nav-btn" onclick="goToPage('page4')">📊</button>
        <button class="nav-btn" onclick="goToPage('page5')">⚙️</button>
    </nav>
    <script src="script.js"></script>
</body>
</html>
