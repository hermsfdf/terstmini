<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        button { padding: 10px; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Привет, <span id="user"></span>!</h1>
    <button onclick="Telegram.WebApp.close()">Закрыть</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран
        document.getElementById("user").innerText = tg.initDataUnsafe.user?.first_name || "Пользователь";
    </script>
</body>
</html>
